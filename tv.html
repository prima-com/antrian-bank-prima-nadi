<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Display Antrian Bank Prima Nadi</title>

<style>
/* ===== CSS ASLI (TIDAK DIUBAH) ===== */
body{margin:0;font-family:Arial;background:#0b2d57;color:white;}
.header{height:70px;background:#1d4c84;display:flex;align-items:center;justify-content:space-between;padding:0 30px;}
.led{font-size:16px;font-weight:bold;letter-spacing:2px;color:#FFD700;}
.container{display:flex;height:62vh;padding:15px;gap:15px;}
.left{width:28%;display:flex;flex-direction:column;gap:12px;}
.box{background:#2a638a;border-radius:15px;display:flex;flex-direction:column;justify-content:center;align-items:center;}
.small{height:12%;}
.big{height:38%;}
.title{font-size:22px;font-weight:bold;}
.nomor{font-size:80px;font-weight:bold;color:gold;text-shadow:0 0 10px #FFD700,0 0 20px rgba(255,215,0,0.7);}
.tv-wrapper{width:45%;display:flex;flex-direction:column;gap:10px;}
.tv{height:85%;border-radius:15px;overflow:hidden;}
.tv iframe{width:100%;height:100%;border:none;}
.penjaminan{height:15%;background:#1d4c84;border-radius:15px;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:bold;letter-spacing:2px;color:#FFD700;}
.promo{width:27%;background:#163d6b;border-radius:15px;padding:15px;position:relative;}
.promo-img{position:absolute;bottom:10px;right:10px;width:95px;animation:glowPulse 2s infinite alternate;}
@keyframes glowPulse{from{filter:drop-shadow(0 0 5px rgba(255,215,0,0.5));}to{filter:drop-shadow(0 0 12px rgba(255,215,0,0.9));}}
.mini{display:flex;gap:12px;padding:6px 20px;height:60px;align-items:center;background:#0e2f5a;}
.loket{flex:1;background:#163d6b;border-radius:25px;padding:5px;text-align:center;}
.loket span{font-size:24px;color:#FFD700;font-weight:bold;}
.running{background:#0a2445;color:yellow;padding:10px;white-space:nowrap;overflow:hidden;}
.running div{display:inline-block;padding-left:100%;animation:jalan 20s linear infinite;}
@keyframes jalan{0%{transform:translateX(0);}100%{transform:translateX(-100%);}}
#unlock{position:fixed;top:0;left:0;width:100%;height:100%;background:#000c;display:flex;align-items:center;justify-content:center;z-index:9999;}
</style>
</head>

<body>

<div id="unlock">
<button onclick="aktifkanSuara()" style="font-size:30px;padding:20px 40px;background:gold;border:none;border-radius:15px;">
🔊 AKTIFKAN SUARA
</button>
</div>

<div class="header">
<img src="logo_pn.png" height="100%">
<div id="jam" class="led"></div>
</div>

<div class="container">

<div class="left">
<div class="box small"><div class="title">LOKET A</div></div>
<div class="box big"><div class="title">NOMOR ANTRIAN</div><div class="nomor" id="displayA">-</div></div>
<div class="box small"><div class="title">LOKET B</div></div>
<div class="box big"><div class="title">NOMOR ANTRIAN</div><div class="nomor" id="displayB">-</div></div>
</div>

<div class="tv-wrapper">
<div class="tv">
<iframe id="youtubeFrame" src="https://www.youtube.com/embed/uB-cnjYFTBA?autoplay=1&mute=1"></iframe>
</div>
<div class="penjaminan">
<center>Simpanan Nasabah dijamin oleh LPS sesuai ketentuan</center>
</div>
</div>

<div class="promo">
<img src="promo1.png" class="promo-img">
</div>

</div>

<div class="mini">
<div class="loket"><h3>LOKET 1</h3><span id="loket1">-</span></div>
<div class="loket"><h3>LOKET 2</h3><span id="loket2">-</span></div>
<div class="loket"><h3>LOKET 3</h3><span id="loket3">-</span></div>
<div class="loket"><h3>LOKET 4</h3><span id="loket4">-</span></div>
</div>

<div class="running">
<div>Selamat datang di Bank Prima Nadi • Mohon menunggu nomor antrian Anda</div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
apiKey:"AIzaSy...",
authDomain:"antrian-bank-prima-nadi.firebaseapp.com",
databaseURL:"https://antrian-bank-prima-nadi-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId:"antrian-bank-prima-nadi"
};

const audioBase="https://raw.githubusercontent.com/prima-com/antrian-bank-prima-nadi/main/audio/";

let audioAktif=false;
let lastCalled={};
let audioQueue=Promise.resolve();

function playAudio(file){
return new Promise(resolve=>{
const a=new Audio(audioBase+file);
a.load();
a.onended=()=>setTimeout(resolve,200);
a.onerror=()=>resolve();
a.play().catch(()=>resolve());
});
}

function panggilAntrian(nomor,loket){
audioQueue=audioQueue.then(async()=>{
if(!audioAktif) return;

const huruf=nomor.charAt(0);
const angka=nomor.substring(1).split("");

await playAudio("ding.mp3");
await playAudio("nomor_antrian.mp3");
await playAudio(huruf+".mp3");

for(let a of angka){
await playAudio(a+".mp3");
}

await playAudio("silakan_menuju.mp3");
await playAudio(loket+".mp3");
});
}

function aktifkanSuara(){
audioAktif=true;
new Audio(audioBase+"ding.mp3").play().catch(()=>{});
document.getElementById("unlock").style.display="none";
}

firebase.initializeApp(firebaseConfig);
const db=firebase.database();

function listenLoket(id){
db.ref("loket/"+id).on("value",(snap)=>{
const data=snap.val();
if(!data) return;

const nomor=data.nomor;
document.getElementById(id).innerText=nomor;

if(lastCalled[id]!==data.waktu){
panggilAntrian(nomor,id);
lastCalled[id]=data.waktu;
}
});
}

listenLoket("loket1");
listenLoket("loket2");
listenLoket("loket3");
listenLoket("loket4");

function updateJam(){
const now=new Date();
document.getElementById("jam").innerHTML=
now.toLocaleDateString("id-ID")+"<br>"+now.toLocaleTimeString("id-ID");
}
setInterval(updateJam,1000);
updateJam();
</script>

</body>
</html>
