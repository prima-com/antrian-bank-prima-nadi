<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Display Antrian - PT BPR Prima Nadi</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0b2d57;
color:white;
overflow:hidden;
}

/* HEADER */

.header{
height:80px;
background:#1d4c84;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 30px;
}

.bank{
font-size:28px;
font-weight:bold;
}

.jam{
font-size:18px;
color:#FFD700;
}

/* LAYOUT */

.container{
display:flex;
height:70vh;
padding:15px;
gap:15px;
}

/* NOMOR BESAR */

.left{
width:35%;
display:flex;
flex-direction:column;
gap:15px;
}

.box{
flex:1;
background:#1c4f86;
border-radius:15px;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
}

.title{
font-size:22px;
margin-bottom:10px;
}

.nomor{
font-size:90px;
font-weight:bold;
color:#FFD700;
text-shadow:0 0 15px gold;
}

/* VIDEO */

.video{
width:40%;
background:black;
border-radius:15px;
overflow:hidden;
}

.video iframe{
width:100%;
height:100%;
border:none;
}

/* INFO */

.info{
width:25%;
background:#163d6b;
border-radius:15px;
padding:15px;
}

.info h3{
text-align:center;
margin-top:0;
}

.info table{
width:100%;
border-collapse:collapse;
}

.info td{
padding:8px;
border-bottom:1px solid #ffffff22;
}

/* LOKET MINI */

.loketBar{
height:80px;
background:#0e2f5a;
display:flex;
gap:10px;
padding:10px;
}

.loket{
flex:1;
background:#1c4f86;
border-radius:10px;
text-align:center;
padding:5px;
}

.loket h4{
margin:0;
font-size:16px;
}

.loket span{
font-size:26px;
color:#FFD700;
font-weight:bold;
}

/* RUNNING TEXT */

.running{
height:40px;
background:#081c36;
display:flex;
align-items:center;
overflow:hidden;
}

.running div{
white-space:nowrap;
padding-left:100%;
animation:jalan 20s linear infinite;
font-size:18px;
color:yellow;
}

@keyframes jalan{
0%{transform:translateX(0)}
100%{transform:translateX(-100%)}
}

/* ANIMASI LOKET */

.active{
animation:pulse 1s 3;
border:2px solid gold;
}

@keyframes pulse{
0%{transform:scale(1)}
50%{transform:scale(1.05)}
100%{transform:scale(1)}
}

</style>
</head>

<body>

<div class="header">

<div class="bank">
PT. BPR PRIMA NADI
</div>

<div class="jam" id="jam"></div>

</div>


<div class="container">

<div class="left">

<div class="box">
<div class="title">CUSTOMER SERVICE</div>
<div class="nomor" id="displayA">-</div>
</div>

<div class="box">
<div class="title">TELLER</div>
<div class="nomor" id="displayB">-</div>
</div>

</div>


<div class="video">
<iframe id="youtubeFrame"
src="https://www.youtube.com/embed/uB-cnjYFTBA?autoplay=1&mute=1">
</iframe>
</div>


<div class="info">

<h3>INFO LAYANAN</h3>

<table>
<tr><td>CS 1</td><td>Loket 1</td></tr>
<tr><td>CS 2</td><td>Loket 2</td></tr>
<tr><td>Teller 1</td><td>Loket 3</td></tr>
<tr><td>Teller 2</td><td>Loket 4</td></tr>
</table>

</div>

</div>


<div class="loketBar">

<div class="loket">
<h4>LOKET 1</h4>
<span id="loket1">-</span>
</div>

<div class="loket">
<h4>LOKET 2</h4>
<span id="loket2">-</span>
</div>

<div class="loket">
<h4>LOKET 3</h4>
<span id="loket3">-</span>
</div>

<div class="loket">
<h4>LOKET 4</h4>
<span id="loket4">-</span>
</div>

</div>


<div class="running">
<div id="runningText">
Selamat datang di PT. BPR Prima Nadi • Mohon menunggu nomor antrian dipanggil
</div>
</div>


<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<script>

const firebaseConfig={
apiKey:"AIzaSyB7f2r5KbTkk-14bc5cXNHEVlV5J1WfMf8",
authDomain:"antrian-bank-prima-nadi.firebaseapp.com",
databaseURL:"https://antrian-bank-prima-nadi-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId:"antrian-bank-prima-nadi"
};

firebase.initializeApp(firebaseConfig);

const db=firebase.database();

let lastTime={};

/* JAM */

function updateJam(){
let now=new Date();

document.getElementById("jam").innerHTML=
now.toLocaleDateString("id-ID",{weekday:"long",day:"numeric",month:"long",year:"numeric"})+
"<br>"+now.toLocaleTimeString("id-ID");
}

setInterval(updateJam,1000);
updateJam();


/* SUARA */

function speak(text){

speechSynthesis.cancel()

let msg=new SpeechSynthesisUtterance(text)
msg.lang="id-ID"

speechSynthesis.speak(msg)

}


/* LISTEN LOKET */

function listenLoket(id){

db.ref("loket/"+id).on("value",(snap)=>{

let data=snap.val()

if(!data) return

let nomor=data.nomor
let waktu=data.waktu

document.getElementById(id).innerText=nomor

if(nomor.startsWith("A"))
document.getElementById("displayA").innerText=nomor

if(nomor.startsWith("B"))
document.getElementById("displayB").innerText=nomor

if(lastTime[id]!=waktu){

let el=document.getElementById(id).parentElement

el.classList.add("active")

setTimeout(()=>{
el.classList.remove("active")
},2000)

speak("Nomor antrian "+nomor+" silakan menuju "+id.replace("loket","loket "))

lastTime[id]=waktu

}

})

}

listenLoket("loket1")
listenLoket("loket2")
listenLoket("loket3")
listenLoket("loket4")


/* DISPLAY CONFIG */

db.ref("displayConfig").on("value",(snap)=>{

let data=snap.val()

if(!data) return

if(data.runningText)
document.getElementById("runningText").innerText=data.runningText


if(data.youtube){

let video=data.youtube

if(video.includes("watch?v="))
video=video.split("watch?v=")[1]

if(video.includes("youtu.be/"))
video=video.split("youtu.be/")[1]

document.getElementById("youtubeFrame").src=
"https://www.youtube.com/embed/"+video+"?autoplay=1&mute=1"

}

})

</script>

</body>
</html>
