<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Dashboard Operator</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>

body{
font-family:Arial;
background:#0e2f5a;
color:white;
text-align:center;
margin:0;
padding:20px;
}

/* LOGIN */

.loginBox{
position:fixed;
inset:0;
background:#0e2f5a;
display:flex;
justify-content:center;
align-items:center;
z-index:9999;
}

.loginContent{
background:white;
padding:30px;
border-radius:10px;
width:300px;
color:black;
}

/* BUTTON */

button{
padding:12px;
margin:6px 0;
font-size:14px;
border:none;
border-radius:6px;
cursor:pointer;
background:#FFD700;
font-weight:bold;
width:100%;
}

button:hover{
opacity:0.85;
}

/* LOKET LAYOUT */

.loketWrapper{
display:flex;
justify-content:space-between;
margin-top:20px;
gap:20px;
}

.loketColumn{
width:50%;
}

.loketCard{
background:#133b72;
padding:20px;
border-radius:12px;
margin-bottom:20px;
box-shadow:0 8px 18px rgba(0,0,0,0.3);
}

.loketTitle{
font-size:20px;
font-weight:bold;
margin-bottom:10px;
}

/* STATISTIK */

#statsBox{
margin-top:20px;
font-size:18px;
}

/* CHART */

canvas{
background:white;
border-radius:10px;
padding:10px;
margin-top:20px;
}

/* EXPORT */

.exportBtn{
margin-top:20px;
background:#00c853;
color:white;
width:250px;
}

/* RANKING */

.rankingCard{
background:#1d4c84;
padding:12px;
margin:6px;
border-radius:8px;
}

</style>
</head>
<body>

<!-- LOGIN -->

<div class="loginBox" id="loginBox">
<div class="loginContent">

<h3>Login Operator</h3>

<input id="username" placeholder="Username" style="width:100%;padding:10px;margin-bottom:10px">

<input id="password" type="password" placeholder="Password" style="width:100%;padding:10px;margin-bottom:10px">

<button onclick="login()">Masuk</button>

</div>
</div>

<h1>DASHBOARD OPERATOR</h1>

<div id="operatorInfo"></div>


<!-- LOKET -->

<div class="loketWrapper">

<!-- KIRI -->

<div class="loketColumn">

<div class="loketCard">
<div class="loketTitle">Loket 1</div>
<button onclick="panggil('loket1')">Panggil</button>
<button onclick="ulang('loket1')">Ulang</button>
<button onclick="selesai('loket1')">Selesai</button>
</div>

<div class="loketCard">
<div class="loketTitle">Loket 3</div>
<button onclick="panggil('loket3')">Panggil</button>
<button onclick="ulang('loket3')">Ulang</button>
<button onclick="selesai('loket3')">Selesai</button>
</div>

</div>


<!-- KANAN -->

<div class="loketColumn">

<div class="loketCard">
<div class="loketTitle">Loket 2</div>
<button onclick="panggil('loket2')">Panggil</button>
<button onclick="ulang('loket2')">Ulang</button>
<button onclick="selesai('loket2')">Selesai</button>
</div>

<div class="loketCard">
<div class="loketTitle">Loket 4</div>
<button onclick="panggil('loket4')">Panggil</button>
<button onclick="ulang('loket4')">Ulang</button>
<button onclick="selesai('loket4')">Selesai</button>
</div>

</div>

</div>


<!-- STATISTIK -->

<h2>STATISTIK HARI INI</h2>

<div id="statsBox"></div>


<!-- GRAFIK -->

<h2>GRAFIK PERFORMA</h2>

<canvas id="chartAntrian" height="100"></canvas>


<!-- EXPORT -->

<button class="exportBtn" onclick="exportExcel()">⬇ Download Laporan XLSX</button>


<!-- RANKING -->

<h2>🏆 RANKING LOKET TERCEPAT</h2>

<div id="rankingBox"></div>


<!-- JAM SIBUK -->

<h2>📊 GRAFIK JAM SIBUK</h2>

<canvas id="chartJam" height="100"></canvas>



<script>

/* FIREBASE */

var firebaseConfig = {
apiKey: "AIzaSyB7f2r5KbTkk-14bc5cXNHEVlV5J1WfMf8",
authDomain: "antrian-bank-prima-nadi.firebaseapp.com",
databaseURL: "https://antrian-bank-prima-nadi-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId: "antrian-bank-prima-nadi"
};

firebase.initializeApp(firebaseConfig);

var db=firebase.database();


let role=null
let allowedLoket=[]
let lastNomor={}
let busyLoket={}
let activeCallData={}


/* LOGIN */

function login(){

const username=document.getElementById("username").value
const password=document.getElementById("password").value

db.ref("users/"+username).once("value",snap=>{

if(!snap.exists()){
alert("User tidak ditemukan")
return
}

const data=snap.val()

if(data.password!==password){
alert("Password salah")
return
}

role=data.role

document.getElementById("loginBox").style.display="none"

initRole()

})

}


function initRole(){

if(role==="cs"){
allowedLoket=["loket1","loket2"]
}else{
allowedLoket=["loket3","loket4"]
}

document.getElementById("operatorInfo").innerHTML=
"<h3>Login sebagai "+role.toUpperCase()+"</h3>"

hideUnauthorized()

}


function hideUnauthorized(){

document.querySelectorAll("button").forEach(btn=>{

const oc=btn.getAttribute("onclick")

if(oc){

const match=oc.match(/'(loket\d+)'/)

if(match){

if(!allowedLoket.includes(match[1])){
btn.style.display="none"
}

}

}

})

}



/* PANGGIL */

function panggil(loket){

if(busyLoket[loket]) return

busyLoket[loket]=true

let prefix=(loket==="loket1"||loket==="loket2")?"A":"B"

db.ref("queue/"+prefix)
.orderByChild("status")
.equalTo("waiting")
.limitToFirst(1)
.once("value",snap=>{

if(!snap.exists()){
alert("Tidak ada antrian")
busyLoket[loket]=false
return
}

let key=Object.keys(snap.val())[0]
let data=snap.val()[key]

lastNomor[loket]=data.nomor

activeCallData[loket]={

nomor:data.nomor,
calledTime:Date.now()

}

db.ref("queue/"+prefix+"/"+key).update({

status:"called",
calledTime:Date.now(),
loket:loket

})

db.ref("loket/"+loket).set({

nomor:data.nomor,
waktu:Date.now()

})

setTimeout(()=>{
busyLoket[loket]=false
},1500)

})

}


/* SELESAI */

function selesai(loket){

if(!activeCallData[loket]) return

let data=activeCallData[loket]

let selesaiTime=Date.now()

let durasi=Math.floor((selesaiTime-data.calledTime)/1000)

let today=new Date().toISOString().slice(0,10)

db.ref("serviceLog/"+today).push({

nomor:data.nomor,
loket:loket,
durasi:durasi,
waktuPanggil:data.calledTime,
waktuSelesai:selesaiTime

})

delete activeCallData[loket]

alert("Durasi layanan "+durasi+" detik")

}


/* ULANG */

function ulang(loket){

if(!lastNomor[loket]) return

db.ref("loket/"+loket).set({

nomor:lastNomor[loket],
waktu:Date.now()

})

}


/* EXPORT XLSX */

function exportExcel(){

let today=new Date().toISOString().slice(0,10)

db.ref("serviceLog/"+today).once("value",snap=>{

let dataArray=[]

snap.forEach(child=>{

let d=child.val()

dataArray.push({

Nomor:d.nomor,
Loket:d.loket,
Durasi:d.durasi

})

})

let ws=XLSX.utils.json_to_sheet(dataArray)

let wb=XLSX.utils.book_new()

XLSX.utils.book_append_sheet(wb,ws,"Laporan")

XLSX.writeFile(wb,"laporan_"+today+".xlsx")

})

}

</script>

</body>
</html>
