<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Dashboard Operator Enterprise MAX</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
font-family:Arial;
background:#0e2f5a;
color:white;
text-align:center;
margin:0;
padding:20px;
}
button{
padding:10px 18px;
margin:5px;
font-size:15px;
border:none;
border-radius:6px;
cursor:pointer;
background:#FFD700;
font-weight:bold;
}
button:hover{opacity:0.85;}
.loginBox{
position:fixed;
inset:0;
background:#0e2f5a;
display:flex;
justify-content:center;
align-items:center;
z-index:9999;
}
.loginContent{
background:white;
padding:30px;
border-radius:10px;
width:300px;
text-align:center;
color:black;
}
#statsBox{
margin-top:20px;
font-size:18px;
}
canvas{
background:white;
border-radius:10px;
padding:10px;
margin-top:15px;
}
.exportBtn{
margin-top:20px;
background:#00c853;
color:white;
}
</style>
</head>
<body>

<div class="loginBox" id="loginBox">
<div class="loginContent">
<h3>Login Operator</h3>
<input type="text" id="username" placeholder="Username" style="width:100%;padding:10px;margin-bottom:10px;">
<input type="password" id="password" placeholder="Password" style="width:100%;padding:10px;margin-bottom:10px;">
<button onclick="login()">Masuk</button>
</div>
</div>

<h1>DASHBOARD OPERATOR</h1>
<div id="operatorInfo"></div>

<div>
<button onclick="panggil('loket1')">Panggil Loket 1</button>
<button onclick="ulang('loket1')">Ulang</button>
<button onclick="selesai('loket1')">Selesai</button><br>

<button onclick="panggil('loket2')">Panggil Loket 2</button>
<button onclick="ulang('loket2')">Ulang</button>
<button onclick="selesai('loket2')">Selesai</button><br>

<button onclick="panggil('loket3')">Panggil Loket 3</button>
<button onclick="ulang('loket3')">Ulang</button>
<button onclick="selesai('loket3')">Selesai</button><br>

<button onclick="panggil('loket4')">Panggil Loket 4</button>
<button onclick="ulang('loket4')">Ulang</button>
<button onclick="selesai('loket4')">Selesai</button>
</div>

<h2>STATISTIK HARI INI</h2>
<div id="statsBox"></div>

<h2>GRAFIK PERFORMA</h2>
<canvas id="chartAntrian" height="100"></canvas>

<button class="exportBtn" onclick="exportExcel()">⬇ Download Laporan Hari Ini</button>

<script>
var firebaseConfig = {
apiKey: "AIzaSyB7f2r5KbTkk-14bc5cXNHEVlV5J1WfMf8",
authDomain: "antrian-bank-prima-nadi.firebaseapp.com",
databaseURL: "https://antrian-bank-prima-nadi-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId: "antrian-bank-prima-nadi"
};

firebase.initializeApp(firebaseConfig);
var db = firebase.database();

let role=null;
let allowedLoket=[];
let lastNomor={};
let busyLoket={};
let activeCallData={};

function login(){
const username=document.getElementById("username").value;
const password=document.getElementById("password").value;

db.ref("users/"+username).once("value",snap=>{
if(!snap.exists()){alert("User tidak ditemukan");return;}
const data=snap.val();
if(data.password!==password){alert("Password salah");return;}
role=data.role;
document.getElementById("loginBox").style.display="none";
initRole();
});
}

function initRole(){
if(role==="cs"){
allowedLoket=["loket1","loket2"];
}else{
allowedLoket=["loket3","loket4"];
}
document.getElementById("operatorInfo").innerHTML=
"<h3>Login sebagai: "+role.toUpperCase()+"</h3>";
hideUnauthorized();
}

function hideUnauthorized(){
document.querySelectorAll("button").forEach(btn=>{
const oc=btn.getAttribute("onclick");
if(oc){
const match=oc.match(/'(loket\d+)'/);
if(match){
if(!allowedLoket.includes(match[1])){
btn.style.display="none";
}
}
}
});
}

function panggil(loket){
if(busyLoket[loket]) return;
busyLoket[loket]=true;

let prefix=(loket==="loket1"||loket==="loket2")?"A":"B";

db.ref("queue/"+prefix)
.orderByChild("status")
.equalTo("waiting")
.limitToFirst(1)
.once("value",snap=>{

if(!snap.exists()){
alert("Tidak ada antrian");
busyLoket[loket]=false;
return;
}

let key=Object.keys(snap.val())[0];
let data=snap.val()[key];

lastNomor[loket]=data.nomor;

activeCallData[loket]={
nomor:data.nomor,
calledTime:Date.now()
};

db.ref("queue/"+prefix+"/"+key).update({
status:"called",
calledTime:Date.now(),
loket:loket
});

db.ref("loket/"+loket).set({
nomor:data.nomor,
waktu:Date.now()
});

db.ref("stats/totalWaiting").transaction(v=>(v||1)-1);
db.ref("stats/totalCalled").transaction(v=>(v||0)+1);

let today=new Date().toISOString().slice(0,10);
db.ref("history/"+today).push({
nomor:data.nomor,
loket:loket,
waktu:Date.now()
});

setTimeout(()=>{busyLoket[loket]=false;},1500);
});
}

function selesai(loket){
if(!activeCallData[loket]) return;

let data=activeCallData[loket];
let selesaiTime=Date.now();
let durasi=Math.floor((selesaiTime-data.calledTime)/1000);
let today=new Date().toISOString().slice(0,10);

db.ref("serviceLog/"+today).push({
nomor:data.nomor,
loket:loket,
durasi:durasi,
waktuPanggil:data.calledTime,
waktuSelesai:selesaiTime
});

db.ref("stats/avgServiceTime").transaction(v=>{
if(!v) return durasi*1000;
return (v + durasi*1000)/2;
});

delete activeCallData[loket];
alert("Layanan selesai. Durasi: "+durasi+" detik");
}

function ulang(loket){
if(!lastNomor[loket]) return;
db.ref("loket/"+loket).set({
nomor:lastNomor[loket],
waktu:Date.now()
});
}

db.ref("stats").on("value",snap=>{
let s=snap.val();
if(!s) return;

document.getElementById("statsBox").innerHTML=
"Total Antrian: "+(s.totalToday||0)+"<br>"+
"Sudah Dipanggil: "+(s.totalCalled||0)+"<br>"+
"Sisa Menunggu: "+(s.totalWaiting||0)+"<br>"+
"Rata-rata Layanan: "+Math.round((s.avgServiceTime||0)/1000)+" detik";

if(chart){
chart.data.datasets[0].data=[
s.totalToday||0,
s.totalCalled||0,
s.totalWaiting||0
];
chart.update();
}
});

let ctx=document.getElementById('chartAntrian').getContext('2d');
let chart=new Chart(ctx,{
type:'bar',
data:{
labels:['Total','Dipanggil','Menunggu'],
datasets:[{label:'Jumlah',data:[0,0,0]}]
},
options:{responsive:true,plugins:{legend:{display:false}}}
});

/* ========================= */
/* ===== EXPORT FIXED ===== */
/* ========================= */

function exportExcel(){
let today=new Date().toISOString().slice(0,10);

db.ref("serviceLog/"+today).once("value",snap=>{

if(snap.exists()){
let csv="Nomor,Loket,Durasi (detik),Waktu Panggil,Waktu Selesai\n";
snap.forEach(child=>{
let d=child.val();
csv+=`${d.nomor},${d.loket},${d.durasi},${new Date(d.waktuPanggil).toLocaleTimeString()},${new Date(d.waktuSelesai).toLocaleTimeString()}\n`;
});
downloadCSV(csv,"Laporan_Lengkap_"+today+".csv");
return;
}

db.ref("history/"+today).once("value",histSnap=>{
if(!histSnap.exists()){
alert("Belum ada data sama sekali hari ini");
return;
}

let csv="Nomor,Loket,Waktu Panggil\n";
histSnap.forEach(child=>{
let d=child.val();
csv+=`${d.nomor},${d.loket},${new Date(d.waktu).toLocaleTimeString()}\n`;
});
downloadCSV(csv,"Laporan_Panggilan_"+today+".csv");
});
});
}

function downloadCSV(csv,filename){
let blob=new Blob([csv],{type:"text/csv"});
let url=URL.createObjectURL(blob);
let a=document.createElement("a");
a.href=url;
a.download=filename;
a.click();
}

</script>
</body>
</html>
